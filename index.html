<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* カスタムアニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        /* スクロールバーのカスタマイズ（オプション） */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fef3c7; }
        ::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f97316; }

<body class="bg-amber-50 font-sans text-gray-800 min-h-screen flex flex-col">
    
    <!-- ヘッダー -->
    <header class="bg-orange-500 text-white shadow-md sticky top-0 z-10">

    </header>

    <main class="max-w-3xl mx-auto p-4 md:p-6 py-8 md:py-12 w-full flex-grow">
        <!-- 入力エリア -->

            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-orange-300 to-orange-500"></div>
            
            <label for="ingredientsInput" class="block text-xl md:text-2xl font-bold text-gray-800 mb-3 text-center">
                冷蔵庫にある食材は何ですか？
            </label>
            <p class="text-center text-gray-500 mb-6 text-sm md:text-base">
                使いたい食材をスペースや「、」で区切って入力してください。<br>
                <span class="text-orange-500 font-medium text-xs">例：お肉 にんじん 玉ねぎ</span>
            </p>
            
            <div class="relative">
                <input type="text" id="ingredientsInput" 
                    placeholder="例: 豚肉、白菜、きのこ" 
                    class="w-full border-2 border-orange-200 rounded-2xl p-4 md:p-5 text-lg md:text-xl focus:outline-none focus:border-orange-500 focus:ring-4 focus:ring-orange-100 transition-all shadow-inner"
                    autocomplete="off">
            </div>

            <!-- ジャンル選択 -->
            <div class="mt-5">
                <p class="text-sm font-bold text-gray-700 mb-2">食べたいジャンルは？</p>
                <div class="flex flex-wrap gap-2" id="genreRadios">
                    <label class="flex-1 cursor-pointer min-w-[70px]">

                    </label>
                    <label class="flex-1 cursor-pointer min-w-[70px]">
                        <input type="radio" name="genre" value="和食" class="peer hidden">
                        <div class="text-center py-2 px-3 rounded-xl border-2 border-gray-200 peer-checked:border-orange-500 peer-checked:bg-orange-50 peer-checked:text-orange-700 font-bold text-gray-500 transition-all">和食</div>
                    </label>
                    <label class="flex-1 cursor-pointer min-w-[70px]">
                        <input type="radio" name="genre" value="洋食" class="peer hidden">
                        <div class="text-center py-2 px-3 rounded-xl border-2 border-gray-200 peer-checked:border-orange-500 peer-checked:bg-orange-50 peer-checked:text-orange-700 font-bold text-gray-500 transition-all">洋食</div>
                    </label>

                        <input type="radio" name="genre" value="中華" class="peer hidden">
                        <div class="text-center py-2 px-3 rounded-xl border-2 border-gray-200 peer-checked:border-orange-500 peer-checked:bg-orange-50 peer-checked:text-orange-700 font-bold text-gray-500 transition-all">中華</div>

                <button id="clearMemoBtn" class="text-xs md:text-sm text-gray-400 hover:text-red-500 flex items-center gap-1 transition-colors px-2 py-1 rounded hover:bg-red-50">

                    <option value="time">⏱️ 時間が短い順</option>
                    <option value="favorite">💖 お気に入り優先</option>
                    <option value="good">😋 美味しかった優先</option>

        // --- 2. ローカルストレージ（保存）機能 ---

        window.toggleAction = function(key, id, btnElement) {
            let data = getSavedData(key);

            if (isActive) {
                data = data.filter(item => item !== id);
            } else {
                data.push(id);
            }
            setSavedData(key, data);
            
            // ボタンの見た目更新
            const isFavKey = key === 'recipe_favorites';
            const activeColorBg = isFavKey ? 'bg-pink-100' : 'bg-orange-100';
            const activeColorText = isFavKey ? 'text-pink-500' : 'text-orange-500';
            
            if (!isActive) { // 新しくアクティブになった
                btnElement.classList.replace('bg-gray-100', activeColorBg);
                btnElement.classList.replace('text-gray-400', activeColorText);
                btnElement.classList.remove('hover:bg-gray-200');
                btnElement.querySelector('svg').setAttribute('fill', 'currentColor');
                // アニメーション効果
                btnElement.style.transform = 'scale(1.2)';
                setTimeout(() => btnElement.style.transform = 'scale(1)', 200);
            } else {
                btnElement.classList.replace(activeColorBg, 'bg-gray-100');
                btnElement.classList.replace(activeColorText, 'text-gray-400');
                btnElement.classList.add('hover:bg-gray-200');
                btnElement.querySelector('svg').setAttribute('fill', 'none');
            }
        };

        // --- 3. UIとロジックの連携 ---
        const ingredientsInput = document.getElementById('ingredientsInput');

        const recipeList = document.getElementById('recipeList');
        const sortSelect = document.getElementById('sortSelect');

        const freeMemo = document.getElementById('freeMemo');
        const memoStatus = document.getElementById('memoStatus');
        const clearMemoBtn = document.getElementById('clearMemoBtn');

        // メモの読み込みと自動保存ロジック
        freeMemo.value = localStorage.getItem('recipe_free_memo') || '';
        let memoTimeout;
        freeMemo.addEventListener('input', () => {
            clearTimeout(memoTimeout);
            localStorage.setItem('recipe_free_memo', freeMemo.value);
            memoStatus.textContent = '保存しました ✓';
            memoStatus.classList.remove('opacity-0', 'text-red-500');
            memoStatus.classList.add('text-yellow-600');
            memoTimeout = setTimeout(() => {
                memoStatus.classList.add('opacity-0');

        });

        // メモのクリア機能（誤操作防止のため2回クリックで削除）
        let confirmClear = false;
        clearMemoBtn.addEventListener('click', () => {
            if (freeMemo.value === '') return;
            
            if (!confirmClear) {
                confirmClear = true;
                clearMemoBtn.innerHTML = `<span class="text-red-600 font-bold px-1">本当に消す？</span>`;
                
                setTimeout(() => {
                    if(confirmClear) {
                        confirmClear = false;
                        resetClearBtnUI();
                    }
                }, 3000); // 3秒経過で元に戻る
            } else {
                freeMemo.value = '';

        let currentResults = [];

        searchBtn.addEventListener('click', () => {
            const rawInput = ingredientsInput.value.trim();
            // スペース（全半角）や「、」「,」で分割してキーワード配列を作成
            const keywords = rawInput.split(/[\s,、]+/).filter(w => w);
            const selectedGenre = document.querySelector('input[name="genre"]:checked').value;

            // UIリセット＆ローディング
            loadingArea.classList.remove('hidden');
            resultArea.classList.add('hidden');
            recipeList.innerHTML = '';

            // 擬似的な読み込み時間を作ってワクワク感を演出（0.8秒）
            setTimeout(() => {
                currentResults = performSearch(keywords, selectedGenre);

                renderRecipes();
                loadingArea.classList.add('hidden');
                resultArea.classList.remove('hidden');
            }, 800);
        });

        // 検索ロジック
        function performSearch(keywords, genre) {
            let results = recipes.map(recipe => {
                let score = 0;
                
                if (keywords.length === 0) {
                    score = 1; // キーワードなしの場合はすべて表示対象
                } else {
                    // キーワードが一つでもマッチするか判定しつつスコア計算
                    keywords.forEach(kw => {
                        const word = kw.toLowerCase();
                        if (recipe.name.includes(word)) score += 3;
                        if (recipe.tags.some(t => t.includes(word))) score += 2;
                        if (recipe.ingredientsText.includes(word)) score += 1;
                    });
                }
                return { ...recipe, score };
            });

            // マッチしなかったもの（スコア0）は除外（キーワードがある場合のみ）
            if (keywords.length > 0) {
                results = results.filter(r => r.score > 0);
            }

            // ジャンルで絞り込み
            if (genre !== 'all') {
                results = results.filter(r => r.genre === genre);
            }

            return results;
        }

        // ソート処理
        function applySorting() {
            const sortType = sortSelect.value;
            const favorites = getSavedData('recipe_favorites');
            const goods = getSavedData('recipe_goods');

            currentResults.sort((a, b) => {
                if (sortType === 'score') {
                    // スコアが高い順
                    return b.score - a.score;
                } else if (sortType === 'time') {
                    // 時間が短い順
                    return a.timeMinutes - b.timeMinutes;
                } else if (sortType === 'favorite') {
                    // お気に入り登録済みを上に
                    const aFav = favorites.includes(a.id) ? 1 : 0;
                    const bFav = favorites.includes(b.id) ? 1 : 0;
                    if (aFav !== bFav) return bFav - aFav;
                    return b.score - a.score; // 同じ場合はスコア順
                } else if (sortType === 'good') {
                    // 美味しかった登録済みを上に
                    const aGood = goods.includes(a.id) ? 1 : 0;
                    const bGood = goods.includes(b.id) ? 1 : 0;
                    if (aGood !== bGood) return bGood - aGood;
                    return b.score - a.score;
                }
                return 0;
            });
        }

        sortSelect.addEventListener('change', () => {
            displayLimit = 3; // 表示件数リセット
            applySorting();

                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="${isFav ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                </button>
                                <button onclick="toggleAction('recipe_goods', '${recipe.id}', this)" title="美味しかった！" class="w-12 h-12 rounded-full flex items-center justify-center transition-all ${isGood ? 'bg-orange-100 text-orange-500' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="${isGood ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                                </button>
                            </div>
                        </div>
                        
                        <p class="text-gray-600 mb-5 text-sm md:text-base font-medium bg-amber-50 p-3 rounded-xl border border-amber-100 inline-block">💡 ${recipe.message}</p>
                        
                        <!-- 材料エリア -->
                        <div class="bg-gradient-to-r from-orange-50 to-amber-50 rounded-2xl p-5 mb-5 border border-orange-100 shadow-sm">
                            <h4 class="font-bold text-orange-800 mb-3 flex items-center gap-2 text-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                材料・調味料
                            </h4>
                            <div class="space-y-3">
                                <p class="text-gray-700 leading-relaxed"><span class="font-bold text-orange-700 bg-orange-100 px-2 py-0.5 rounded text-sm mr-2">具材</span> ${recipe.ingredientsText}</p>
                                <div class="text-gray-700">
                                    <span class="font-bold text-amber-700 bg-amber-100 px-2 py-0.5 rounded text-sm mr-2 mb-2 inline-block">調味料</span>
                                    <ul class="list-disc list-inside ml-2 grid grid-cols-1 sm:grid-cols-2 gap-y-1 gap-x-4 text-sm md:text-base">
                                        ${recipe.seasonings.map(s => `<li>${s}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <!-- 作り方アコーディオン -->
                        <details class="group">
                            <summary class="cursor-pointer list-none flex items-center justify-between font-bold text-gray-700 bg-gray-50 hover:bg-orange-50 p-4 rounded-2xl transition-colors border-2 border-gray-100 hover:border-orange-200">
                                <span class="flex items-center gap-3 text-lg">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-500"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                    作り方を見る
                                </span>
                                <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-sm border border-gray-200 group-open:rotate-180 transition-transform duration-300">
                                    <svg class="w-5 h-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </summary>
                            <div class="pt-5 pb-2 px-2">
                                <ol class="space-y-5">
                                    ${recipe.steps.map((step, i) => `
                                        <li class="flex gap-4 text-base md:text-lg text-gray-700">
                                            <span class="font-extrabold text-white bg-orange-400 w-8 h-8 rounded-full flex items-center justify-center shrink-0 shadow-md mt-0.5">${i + 1}</span>
                                            <span class="leading-relaxed">${step}</span>
                                        </li>
                                    `).join('')}
                                </ol>
                            </div>
                        </details>
                    </div>
                `;
                recipeList.appendChild(card);
            });

            // 「もっと表示」ボタンの出し分け
            if (currentResults.length > displayLimit) {
                loadMoreBtn.classList.remove('hidden');
            } else {
                loadMoreBtn.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
